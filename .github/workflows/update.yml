name: Update calendars

# Refresh fixtures/scores/knockout teams from openfootball and regenerate the
# .ics feeds. Output is deterministic, so a commit happens only when something
# actually changed. Knockout broadcaster picks are added by hand in
# data/broadcasters.json and get picked up on the next run.
#
# Schedule: hourly while a match could plausibly be in progress. US-hosted
# kickoffs run 16:00-03:00 UTC; add ~3h for extra time/penalties, so
# 16:00-05:59 UTC is the active window. Outside that, just a light touch
# every 3h to keep things from going stale.

on:
  schedule:
    - cron: '17 16-23 * * *'      # active window pt.1: 16:00-23:59 UTC, hourly
    - cron: '17 0-5 * * *'        # active window pt.2: 00:00-05:59 UTC, hourly
    - cron: '17 6,9,12,15 * * *'  # quiet window: every ~3h the rest of the day
  workflow_dispatch:                # allow manual runs

permissions:
  contents: write

concurrency:
  group: update-calendars
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Refresh openfootball fixture data
        run: |
          base="https://raw.githubusercontent.com/openfootball/world-cup/master/2026--usa"
          for f in cup.txt cup_finals.txt cup_stadiums.csv; do
            curl -fsSL "$base/$f" -o "data/$f"
          done

      - name: Regenerate calendars
        run: python3 generate.py

      - name: Sync bracket + dropped-teams to the pool sheet
        env:
          GOOGLE_SHEETS_SA_KEY: ${{ secrets.GOOGLE_SHEETS_SA_KEY }}
        run: |
          if [ -z "$GOOGLE_SHEETS_SA_KEY" ]; then
            echo "GOOGLE_SHEETS_SA_KEY secret not set — skipping sheet sync."
            exit 0
          fi
          pip install --quiet google-api-python-client google-auth
          python3 sync_bracket.py
          python3 build_dropped.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs data; then
            echo "No changes — feeds already current."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data
          git commit -m "Auto-update: refresh fixtures, scores & resolved knockout teams"
          git push
          echo "Published updated feeds."
